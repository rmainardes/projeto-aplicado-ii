# application.properties
mp.jwt.verify.issuer=foodtruck-app

# O Quarkus procura estes arquivos dentro de src/main/resources por padrăo
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem

quarkus.http.port=${PORT:8080}

# BANCO DE DADOS:
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}

# Substitua pela URL real do seu front-end na Vercel
quarkus.http.cors.origins=https://projeto-aplicado-ii.vercel.app/

# Hibernate em Prod
quarkus.hibernate-orm.schema-generation.database.generation=validate